<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - MindShelf</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a1a;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .header {
      padding: 36px 28px 28px;
      text-align: center;
      background: linear-gradient(135deg,#ff6b35,#ff2d55);
      color: white;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(255,255,255,.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: -.4px; }
    .subtitle { margin-top: 6px; font-size: 13px; color: rgba(255,255,255,.86); }
    .content { padding: 30px 28px 28px; }
    h2 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 20px; color: #666; font-size: 15px; line-height: 1.6; }
    label {
      display: block;
      margin: 14px 0 7px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    input {
      width: 100%;
      height: 48px;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 0 4px rgba(255,107,53,.12);
    }
    button {
      width: 100%;
      height: 50px;
      margin-top: 22px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg,#ff6b35,#ff2d55);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .message {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .message.error {
      display: block;
      background: #fff1f1;
      color: #b42318;
    }
    .message.success {
      display: block;
      background: #effaf3;
      color: #137333;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
    .footer a {
      color: #ff6b35;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <div class="logo">🔖</div>
      <h1>MindShelf</h1>
      <div class="subtitle">Your Bookmark Manager</div>
    </div>

    <div class="content">
      <h2>Reset your password</h2>
      <p>Enter a new password for your MindShelf account. After updating it, return to the app and log in again.</p>

      <form id="resetForm">
        <label for="password">New password</label>
        <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />

        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" placeholder="Repeat your new password" autocomplete="new-password" required />

        <button id="submitButton" type="submit">Update Password</button>
      </form>

      <div id="message" class="message"></div>

      <div class="footer">
        Need help? <a href="mailto:ideloc.studio@gmail.com">Contact support</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bhrukmualirlkapcdiso.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_zG2xqKXR4MzuhrbDrIXRVQ_eArOfDin";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        detectSessionInUrl: true,
        persistSession: true,
        autoRefreshToken: true
      }
    });

    const form = document.getElementById("resetForm");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const button = document.getElementById("submitButton");
    const message = document.getElementById("message");

    let recoveryReady = false;
    button.disabled = true;
    button.textContent = "Checking reset link...";

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message " + type;
    }

    function resetButton() {
      button.disabled = false;
      button.textContent = "Update Password";
    }

    function disableWithError(text) {
      showMessage(text, "error");
      button.disabled = true;
      button.textContent = "Update Password";
    }

    async function initRecoverySession() {
      const params = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const errorDescription = params.get("error_description") || hash.get("error_description");
      const accessToken = hash.get("access_token") || params.get("access_token");
      const refreshToken = hash.get("refresh_token") || params.get("refresh_token");
      const tokenHash = params.get("token_hash") || hash.get("token_hash");
      const code = params.get("code") || hash.get("code");

      if (errorDescription) {
        disableWithError(errorDescription);
        return;
      }

      if (accessToken && refreshToken) {
        const { error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (error) {
          disableWithError("This reset link is invalid or expired. Please request a new password reset email from the MindShelf app.");
          return;
        }

        recoveryReady = true;
        message.className = "message";
        message.textContent = "";
        resetButton();
        return;
      }

      if (tokenHash) {
        const { error } = await client.auth.verifyOtp({
          token_hash: tokenHash,
          type: "recovery"
        });

        if (error) {
          disableWithError("This reset link is invalid or expired. Please request a new password reset email from the MindShelf app.");
          return;
        }

        recoveryReady = true;
        message.className = "message";
        message.textContent = "";
        resetButton();
        return;
      }

      if (code) {
        const { error } = await client.auth.exchangeCodeForSession(code);

        if (error) {
          disableWithError("This reset link is invalid or expired. Please request a new password reset email from the MindShelf app.");
          return;
        }

        recoveryReady = true;
        message.className = "message";
        message.textContent = "";
        resetButton();
        return;
      }

      disableWithError("This reset link is missing or invalid. Please request a new password reset email from the MindShelf app.");
    }

    initRecoverySession().catch(function () {
      disableWithError("Could not prepare this reset link. Please request a new password reset email from the MindShelf app.");
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (password.length < 8) {
        showMessage("Password must be at least 8 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      button.disabled = true;
      button.textContent = "Updating...";

      if (!recoveryReady) {
        showMessage("Your reset session is not ready. Please open the latest reset email again.", "error");
        button.disabled = false;
        button.textContent = "Update Password";
        return;
      }

      const { error } = await client.auth.updateUser({
        password: password
      });

      if (error) {
        showMessage("Could not update your password. Please request a new reset email from the MindShelf app and try again.", "error");
        button.disabled = false;
        button.textContent = "Update Password";
        return;
      }

      showMessage("Your password has been updated. You can now return to the MindShelf app and log in with your new password.", "success");
      form.style.display = "none";
    });
  </script>
</body>
</html>
